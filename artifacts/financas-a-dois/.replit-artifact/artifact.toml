kind = "web"
previewPath = "/"
title = "Finanças a Dois"
version = "1.0.0"
id = "artifacts/financas-a-dois"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25308

[services.development]
run = "pnpm --filter @workspace/financas-a-dois run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/financas-a-dois", "run", "build" ]
serve = "static"
publicDir = "artifacts/financas-a-dois/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25308"
BASE_PATH = "/"
